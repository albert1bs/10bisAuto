name: Keep Alive

on:
  schedule:
    - cron: "0 9 1 * *" # Runs on the 1st of every month at 9:00 AM
  workflow_dispatch: # Allow manual triggering

env:
  TZ: Asia/Jerusalem

jobs:
  keep-alive:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Keep workflows alive
        run: echo "Keeping repository active to prevent scheduled workflows from being disabled."
